name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-14
            target: aarch64-apple-darwin
          - label: Intel
            runner: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Type-check widget source
        run: npm run widget:typecheck

      - name: Build Tauri bundle
        run: npm run tauri:build -- --target ${{ matrix.target }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-${{ matrix.target }}-dmg
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          FLAGS=()
          if [ "$PRERELEASE" = "true" ]; then
            FLAGS+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/*.dmg --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/*.dmg \
              --title "Nexus $RELEASE_TAG" \
              --notes-file CHANGELOG.md \
              "${FLAGS[@]}"
          fi
