name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-14
            arch: arm64
            artifact: arm64-apple-macos
          - label: Intel
            runner: macos-13
            arch: x86_64
            artifact: x86_64-apple-macos
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Native Swift tests
        run: swift test --package-path native/Nexus

      - name: Build Native executable
        run: swift build --configuration release --arch ${{ matrix.arch }} --package-path native/Nexus

      - name: Package Native artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "native/Nexus/.build/${{ matrix.arch }}-apple-macosx/release/NexusNative" dist/NexusNative
          tar -czf "dist/nexus-native-${{ matrix.artifact }}.tar.gz" -C dist NexusNative

      - name: Upload Native artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-native-${{ matrix.artifact }}
          if-no-files-found: error
          path: dist/nexus-native-${{ matrix.artifact }}.tar.gz

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          FLAGS=()
          if [ "$PRERELEASE" = "true" ]; then
            FLAGS+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/*.tar.gz --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/*.tar.gz \
              --title "Nexus $RELEASE_TAG" \
              --notes-file CHANGELOG.md \
              "${FLAGS[@]}"
          fi
