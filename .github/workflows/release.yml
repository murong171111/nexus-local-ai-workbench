name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-14
            arch: arm64
            artifact: arm64-apple-macos
          - label: Intel
            runner: macos-13
            arch: x86_64
            artifact: x86_64-apple-macos
    runs-on: ${{ matrix.runner }}
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Native Swift tests
        run: swift test --package-path native/Nexus

      - name: Build Native app bundle
        run: native/Nexus/Scripts/build-app-bundle.sh --arch ${{ matrix.arch }} --output dist/Nexus.app

      - name: Sign Native app
        if: ${{ env.APPLE_SIGNING_IDENTITY != '' }}
        shell: bash
        run: |
          native/Nexus/Scripts/sign-and-notarize.sh \
            --app dist/Nexus.app \
            --identity "$APPLE_SIGNING_IDENTITY" \
            --skip-notarization

      - name: Package Native artifact
        shell: bash
        run: |
          set -euo pipefail
          test -x dist/Nexus.app/Contents/MacOS/Nexus
          native/Nexus/Scripts/package-dmg.sh \
            --app dist/Nexus.app \
            --output "dist/nexus-native-${{ matrix.artifact }}.dmg" \
            --volume-name "Nexus"

      - name: Sign and notarize Native DMG
        if: ${{ env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_PASSWORD != '' }}
        shell: bash
        run: |
          native/Nexus/Scripts/sign-and-notarize.sh \
            --dmg "dist/nexus-native-${{ matrix.artifact }}.dmg" \
            --identity "$APPLE_SIGNING_IDENTITY" \
            --team-id "$APPLE_TEAM_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD"

      - name: Upload Native artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-native-${{ matrix.artifact }}
          if-no-files-found: error
          path: dist/nexus-native-${{ matrix.artifact }}.dmg

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          FLAGS=()
          if [ "$PRERELEASE" = "true" ]; then
            FLAGS+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/*.dmg --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/*.dmg \
              --title "Nexus $RELEASE_TAG" \
              --notes-file CHANGELOG.md \
              "${FLAGS[@]}"
          fi
